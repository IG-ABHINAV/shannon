services:
  temporal:
    image: temporalio/temporal:latest
    command: ["server", "start-dev", "--db-filename", "/home/temporal/temporal.db", "--ip", "0.0.0.0"]
    ports:
      - "7233:7233"   # gRPC
      - "8233:8233"   # Web UI (built-in)
    volumes:
      - temporal-data:/home/temporal
    healthcheck:
      test: ["CMD", "temporal", "operator", "cluster", "health", "--address", "localhost:7233"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  worker:
    build: .
    entrypoint: ["node", "dist/temporal/worker.js"]
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - SHANNON_CODEX_AUTH_HOME=/codex-host
      - SHANNON_CODEX_MODEL=${SHANNON_CODEX_MODEL:-gpt-5.4}
      - SHANNON_CODEX_REASONING_EFFORT=${SHANNON_CODEX_REASONING_EFFORT:-high}
    depends_on:
      temporal:
        condition: service_healthy
    volumes:
      - ./configs:/app/configs
      - ./prompts:/app/prompts
      - ./audit-logs:/app/audit-logs
      - ${OUTPUT_DIR:-./audit-logs}:/app/output
      - ./repos:/repos
      - ${BENCHMARKS_BASE:-.}:/benchmarks
      - ${CODEX_HOME_HOST:-./.codex-host-missing}:/codex-host:ro
    shm_size: 2gb
    ipc: host
    security_opt:
      - seccomp:unconfined

volumes:
  temporal-data:
